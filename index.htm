<!DOCTYPE html><html>
<head>
<title>My School Memory</title><style>

body{
font-family: Arial, sans-serif;
margin:0;
background:linear-gradient(120deg,#ffd6e7,#ffffff);
overflow-x:hidden;
}

/* HEADER */

header{
text-align:center;
padding:40px;
background:#ff4da6;
color:white;
animation:fadeDown 1.5s;
}

/* STORY AREA */

.story{
max-width:900px;
margin:auto;
padding:30px;
}

/* STORY CARDS */

.card{
background:white;
padding:25px;
margin:25px 0;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
opacity:0;
transform:translateY(40px);
animation:fadeUp 1s forwards;
}

.card:nth-child(1){animation-delay:0.3s;}
.card:nth-child(2){animation-delay:0.6s;}
.card:nth-child(3){animation-delay:0.9s;}
.card:nth-child(4){animation-delay:1.2s;}
.card:nth-child(5){animation-delay:1.5s;}
.card:nth-child(6){animation-delay:1.8s;}
.card:nth-child(7){animation-delay:2.1s;}
.card:nth-child(8){animation-delay:2.4s;}

.card:hover{
transform:scale(1.05);
transition:0.3s;
}

h2{
color:#ff4da6;
}
